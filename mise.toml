[tools]
node = "24"
rust = "1.89.0"

[tasks.install-pnpm]
description = "Install pnpm via curl"
run = "curl -fsSL https://get.pnpm.io/install.sh | env PNPM_VERSION=10.23.0 SHELL=/bin/bash bash -"

[tasks.install-web]
description = "Install web dependencies"
run = "cd apps/web && export PNPM_HOME=$HOME/.local/share/pnpm && export PATH=$PNPM_HOME:$PATH && pnpm install"

[tasks.dev]
description = "Run local development stack with file watching"
run = "docker compose -f infras/docker-compose.yml -f infras/docker-compose.dev.yml up --watch"

[tasks.up]
description = "Run production-like docker compose stack"
run = "docker compose -f infras/docker-compose.yml up --build"

[tasks.api]
description = "Run axum api locally"
run = "cargo run -p api"

[tasks.web]
description = "Run React Router web locally"
run = "cd apps/web && export PNPM_HOME=$HOME/.local/share/pnpm && export PATH=$PNPM_HOME:$PATH && pnpm dev"

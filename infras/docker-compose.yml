services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      RUST_LOG: api=debug,axum=info
    ports:
      - "3000:3000"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
    ports:
      - "5173:3000"
    depends_on:
      - api
